services:
  worker:
    build:
      context: .
      dockerfile: Dockerfile
    init: true
    tty: true
    command: jail-start
    user: node
    read_only: true
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    tmpfs:
      - /tmp:rw,nosuid,nodev,noexec,size=1g
      - /run:rw,nosuid,nodev,noexec,size=64m
      - /var/tmp:rw,nosuid,nodev,noexec,size=512m
      - /home/node/.cache:rw,nosuid,nodev,uid=1000,gid=1000,size=2g
      - /home/node/.npm:rw,nosuid,nodev,uid=1000,gid=1000,size=1g
    environment:
      HTTP_PROXY: http://proxy:8080
      HTTPS_PROXY: http://proxy:8080
      ALL_PROXY: http://proxy:8080
      NO_PROXY: localhost,127.0.0.1,::1,proxy
      npm_config_proxy: http://proxy:8080
      npm_config_https_proxy: http://proxy:8080
      GIT_SSH: /usr/local/bin/ssh
      XDG_CONFIG_HOME: /home/node/.local/config
      GNUPGHOME: /home/node/.local/share/gnupg
      MISE_DATA_DIR: /home/node/.local/share/mise
      MISE_CONFIG_DIR: /home/node/.local/share/mise/config
      MISE_CACHE_DIR: /home/node/.local/cache/mise
      MISE_STATE_DIR: /home/node/.local/state/mise
      JAIL_HEADROOM_TMUX_SESSION: headroom
      JAIL_MANAGED_TMUX_SESSIONS: headroom
      JAIL_SSH_BROKER_HOST: proxy
      JAIL_SSH_BROKER_PORT: "8822"
      JAIL_SSH_BROKER_TOKEN_FILE: /jail-ssh-broker-token
    volumes:
      - ..:/workspace:delegated
      - hardened-vscode-server:/home/node/.vscode-server
      - hardened-shell-history:/shell_history
      - hardened-agent-claude:/home/node/.claude
      - hardened-agent-claude-home:/home/node/.claude-home
      - hardened-agent-codex:/home/node/.codex
      - hardened-agent-state:/home/node/.agents
      - hardened-gsd:/home/node/.gsd
      - hardened-user-local:/home/node/.local
      - ${DEVCONTAINER_JAIL_HOME:-${HOME}/.devcontainer-jail}/requests:/jail-requests
      - ${DEVCONTAINER_JAIL_HOME:-${HOME}/.devcontainer-jail}/policy/ssh-leases:/jail-ssh-leases:ro
      - ${DEVCONTAINER_JAIL_HOME:-${HOME}/.devcontainer-jail}/state/ssh-broker-token:/jail-ssh-broker-token:ro
    networks:
      - jail_net
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      - proxy

  proxy:
    build:
      context: .
      dockerfile: Dockerfile.proxy
    init: true
    read_only: true
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    tmpfs:
      - /tmp:rw,nosuid,nodev,noexec,size=64m
    environment:
      EGRESS_APPROVALS_FILE: /policy/approvals.json
      EGRESS_LOG_FILE: /state/egress.log
      EGRESS_REQUEST_DIR: /jail-requests
      EGRESS_BIND: 0.0.0.0
      EGRESS_PORT: "8080"
      EGRESS_WAIT_FOR_APPROVAL: "true"
      EGRESS_APPROVAL_WAIT_TIMEOUT: "0"
      TCP_FORWARD_BIND: 0.0.0.0
      TCP_FORWARD_PORT: "8822"
      TCP_FORWARD_PORTS: "${JAIL_BRIDGE_PORTS:-}"
      TCP_FORWARD_TARGET_HOST: host.docker.internal
    volumes:
      - ${DEVCONTAINER_JAIL_HOME:-${HOME}/.devcontainer-jail}/policy:/policy:ro
      - ${DEVCONTAINER_JAIL_HOME:-${HOME}/.devcontainer-jail}/state:/state
      - ${DEVCONTAINER_JAIL_HOME:-${HOME}/.devcontainer-jail}/requests:/jail-requests
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - jail_net
      - internet

networks:
  jail_net:
    internal: true
  internet:

volumes:
  hardened-vscode-server:
  hardened-shell-history:
  hardened-agent-claude:
  hardened-agent-claude-home:
  hardened-agent-codex:
  hardened-agent-state:
  hardened-gsd:
  hardened-user-local:
